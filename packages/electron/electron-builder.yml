appId: com.codex-proxy.app
productName: Codex Proxy

publish:
  provider: github
  owner: icebear0828
  repo: codex-proxy

directories:
  output: release

files:
  - dist-electron/**/*
  - electron/assets/**/*
  - package.json
  - "!node_modules"
  - node_modules/koffi/**
  - "!dist"
  # Include root-level runtime files (resolved relative to packages/electron/)
  - from: ../../config
    to: config
    filter:
      - "**/*"
  - from: ../../public
    to: public
    filter:
      - "**/*"
  - from: ../../public-desktop
    to: public-desktop
    filter:
      - "**/*"

# Static assets unpacked from asar (filesystem access at runtime)
asarUnpack:
  - "config/**/*"
  - "public/**/*"
  - "public-desktop/**/*"
  - "node_modules/koffi/**"
  - "**/*.node"

# curl-impersonate binaries as extra resources (outside asar)
extraResources:
  - from: ../../bin/
    to: bin/
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch: [x64]
  icon: electron/assets/icon.png
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

mac:
  target:
    - target: dmg
      arch: [arm64, x64]
    - target: zip
      arch: [arm64, x64]
  icon: electron/assets/icon.png
  category: public.app-category.developer-tools
  # No Apple Developer certificate — electron-builder auto-falls back to
  # ad-hoc signing (codesign -s -). Users see "unidentified developer"
  # warning and can right-click → Open to bypass.

linux:
  target:
    - target: AppImage
      arch: [x64]
  icon: electron/assets/icon.png
  category: Development
